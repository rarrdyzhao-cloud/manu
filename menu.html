<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今晚吃什么 · 减脂晚餐抽签</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --board: #1e332a;
    --board-2: #24402f;
    --chalk: #ede9dd;
    --chalk-dim: #b9c2b6;
    --yellow: #f2c14e;
    --red: #d9603b;
    --paper: #f6f1e2;
    --paper-ink: #2b2620;
    --line: rgba(237,233,221,0.16);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--board);
    background-image:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.03), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(255,255,255,0.03), transparent 60%);
    color: var(--chalk);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }
  .hero {
    text-align: center;
    margin-bottom: 32px;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.28em;
    color: var(--yellow);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 58px;
    line-height: 1;
    margin: 0 0 10px;
    color: var(--chalk);
    text-shadow: 0 0 18px rgba(242,193,78,0.15);
    font-weight: 400;
  }
  .sub {
    color: var(--chalk-dim);
    font-size: 14px;
    letter-spacing: 0.02em;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 28px 0 30px;
  }
  .chip {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 100px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--chalk-dim);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .chip:hover { border-color: var(--yellow); color: var(--chalk); }
  .chip.active {
    background: var(--yellow);
    border-color: var(--yellow);
    color: #2b2620;
    font-weight: 700;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .draw-btn {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: var(--board);
    background: var(--chalk);
    border: none;
    border-radius: 14px;
    padding: 18px 46px;
    cursor: pointer;
    position: relative;
    box-shadow: 0 6px 0 #b9b39c, 0 10px 24px rgba(0,0,0,0.35);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .draw-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #b9b39c, 0 6px 14px rgba(0,0,0,0.3);
  }
  .draw-btn .count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    display: block;
    margin-top: 2px;
    color: #6b6653;
  }

  .rolling {
    font-family: 'Space Mono', monospace;
    color: var(--yellow);
    font-size: 13px;
    height: 20px;
    margin-top: 16px;
    letter-spacing: 0.05em;
    opacity: 0;
  }
  .rolling.show { opacity: 1; }

  .ticket {
    margin-top: 34px;
    width: 100%;
    max-width: 460px;
    background: var(--paper);
    color: var(--paper-ink);
    border-radius: 4px;
    position: relative;
    padding: 30px 28px 26px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    opacity: 0;
    transform: translateY(14px) rotate(0deg);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .ticket.show {
    opacity: 1;
    transform: translateY(0) rotate(-0.6deg);
  }
  .ticket::before, .ticket::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 14px;
    background:
      radial-gradient(circle at 8px 7px, var(--board) 6px, transparent 6.5px) repeat-x;
    background-size: 20px 14px;
  }
  .ticket::before { top: -7px; }
  .ticket::after { bottom: -7px; transform: rotate(180deg); }

  .ticket-id {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #8b8471;
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
    margin-bottom: 14px;
    border-bottom: 1px dashed #cfc7ab;
    padding-bottom: 10px;
  }
  .tag-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--red);
    color: #fff;
    letter-spacing: 0.03em;
  }
  .dish-name {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 900;
    font-size: 26px;
    margin: 6px 0 4px;
    line-height: 1.25;
  }
  .style-line {
    font-size: 13px;
    color: #6b6653;
    margin-bottom: 18px;
  }

  .rowline {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 9px 0;
    border-bottom: 1px solid #e4dcc4;
    font-size: 14px;
  }
  .rowline .label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #a89f84;
    letter-spacing: 0.05em;
    min-width: 56px;
  }
  .rowline .val { text-align: right; font-weight: 500; }

  .stats {
    display: flex;
    gap: 10px;
    margin: 18px 0 4px;
  }
  .stat {
    flex: 1;
    background: #efe8d2;
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat .num {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 19px;
    color: var(--red);
  }
  .stat .lbl {
    font-size: 10px;
    color: #8b8471;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  .steps {
    margin-top: 18px;
    font-size: 13px;
    line-height: 1.75;
    color: #4a4436;
    background: #efe8d2;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .steps b { color: var(--paper-ink); }

  .again-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 26px;
  }
  .ghost-btn {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    color: var(--chalk-dim);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 9px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .ghost-btn:hover { color: var(--chalk); border-color: var(--yellow); }

  .history {
    margin-top: 46px;
  }
  .history-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--chalk-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
    text-align: center;
  }
  .stubs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .stub {
    font-size: 12px;
    background: var(--board-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--chalk-dim);
  }
  .stub b { color: var(--chalk); font-weight: 500; }

  .empty-hint {
    color: var(--chalk-dim);
    font-size: 13px;
    text-align: center;
    margin-top: 18px;
  }

  @media (max-width: 480px) {
    h1 { font-size: 44px; }
    .ticket { padding: 24px 18px 20px; }
    .dish-name { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="eyebrow">150 道减脂晚餐 · 随机抽签</div>
    <h1>今晚吃什么</h1>
    <div class="sub">选不出来就交给命运，抽一张今晚的菜单</div>
  </div>

  <div class="filters" id="filters"></div>

  <div class="stage">
    <button class="draw-btn" id="drawBtn">
      抽一个
      <span class="count" id="poolCount"></span>
    </button>
    <div class="rolling" id="rolling">正在翻牌…</div>

    <div class="ticket" id="ticket">
      <div class="ticket-id">
        <span id="ticketNo">NO. 000</span>
        <span class="tag-pill" id="ticketTag">家常</span>
      </div>
      <div class="dish-name" id="dishName">—</div>
      <div class="style-line" id="styleLine">—</div>

      <div class="rowline">
        <span class="label">主食</span>
        <span class="val" id="stapleVal">—</span>
      </div>
      <div class="rowline">
        <span class="label">蔬菜</span>
        <span class="val" id="vegVal">—</span>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="num" id="kcalVal">—</div>
          <div class="lbl">KCAL</div>
        </div>
        <div class="stat">
          <div class="num" id="proteinVal">—</div>
          <div class="lbl">蛋白质 G</div>
        </div>
      </div>

      <div class="steps" id="stepsVal">—</div>

      <div class="again-row">
        <button class="ghost-btn" id="againBtn">换一个</button>
      </div>
    </div>
    <div class="empty-hint" id="emptyHint" style="display:none;">这个风味筛选下没有菜了，换个筛选试试</div>
  </div>

  <div class="history" id="historyWrap" style="display:none;">
    <div class="history-title">最近抽过</div>
    <div class="stubs" id="stubs"></div>
  </div>
</div>

const TAGS = ["全部", "家常", "川味", "粤式", "西式", "日式", "韩式", "东南亚", "特色"];
let activeTag = "全部";
let history = [];
let rollTimer = null;

const filtersEl = document.getElementById('filters');
const drawBtn = document.getElementById('drawBtn');
const againBtn = document.getElementById('againBtn');
const ticketEl = document.getElementById('ticket');
const rollingEl = document.getElementById('rolling');
const poolCountEl = document.getElementById('poolCount');
const emptyHintEl = document.getElementById('emptyHint');
const historyWrap = document.getElementById('historyWrap');
const stubsEl = document.getElementById('stubs');

function currentPool() {
  if (activeTag === "全部") return MENU;
  return MENU.filter(d => d.tag === activeTag);
}

function renderFilters() {
  filtersEl.innerHTML = "";
  TAGS.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (tag === activeTag ? ' active' : '');
    btn.textContent = tag;
    btn.onclick = () => {
      activeTag = tag;
      renderFilters();
      updatePoolCount();
    };
    filtersEl.appendChild(btn);
  });
}

function updatePoolCount() {
  const n = currentPool().length;
  poolCountEl.textContent = activeTag === "全部" ? (n + " 道可抽") : (activeTag + " · " + n + " 道");
}

function fillTicket(item) {
  document.getElementById('ticketNo').textContent = 'NO. ' + String(item.id).padStart(3, '0');
  document.getElementById('ticketTag').textContent = item.tag;
  document.getElementById('dishName').textContent = item.dish;
  document.getElementById('styleLine').textContent = item.style;
  document.getElementById('stapleVal').textContent = item.staple + '（' + item.staple_method + '）';
  document.getElementById('vegVal').textContent = item.veg + '（' + item.veg_method + '）';
  document.getElementById('kcalVal').textContent = item.kcal;
  document.getElementById('proteinVal').textContent = item.protein;
  document.getElementById('stepsVal').innerHTML = '<b>做法：</b>' + item.steps;
}

function pushHistory(item) {
  history.unshift(item);
  if (history.length > 6) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) {
    historyWrap.style.display = 'none';
    return;
  }
  historyWrap.style.display = 'block';
  stubsEl.innerHTML = "";
  history.forEach(item => {
    const s = document.createElement('div');
    s.className = 'stub';
    s.innerHTML = '<b>' + item.dish.split('（')[0] + '</b> · ' + item.staple.replace(/[0-9()g干湿]/g,'').slice(0,4);
    stubsEl.appendChild(s);
  });
}

function draw() {
  const pool = currentPool();
  if (pool.length === 0) {
    ticketEl.classList.remove('show');
    emptyHintEl.style.display = 'block';
    return;
  }
  emptyHintEl.style.display = 'none';
  ticketEl.classList.remove('show');
  rollingEl.classList.add('show');
  drawBtn.disabled = true;

  let ticks = 0;
  const maxTicks = 10;
  clearInterval(rollTimer);
  rollTimer = setInterval(() => {
    const r = pool[Math.floor(Math.random() * pool.length)];
    rollingEl.textContent = r.dish.split('（')[0] + ' · ' + r.staple.split('(')[0].replace(/[0-9g]/g,'');
    ticks++;
    if (ticks >= maxTicks) {
      clearInterval(rollTimer);
      const final = pool[Math.floor(Math.random() * pool.length)];
      fillTicket(final);
      rollingEl.classList.remove('show');
      requestAnimationFrame(() => ticketEl.classList.add('show'));
      pushHistory(final);
      drawBtn.disabled = false;
    }
  }, 70);
}

drawBtn.addEventListener('click', draw);
againBtn.addEventListener('click', draw);

renderFilters();
updatePoolCount();
</script>
</body>
</html>
